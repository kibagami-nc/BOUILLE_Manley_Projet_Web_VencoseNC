<section class="bid-list">
  @for (bid of bids(); track bid.idBid) {
    <article
      class="bid-card"
      (click)="modal.openBidDetails(bid)"
      (keydown.enter)="modal.openBidDetails(bid)"
      tabindex="0"
      role="button"
    >
      <div class="bid-image">
        <img src="https://placehold.co/120x120?text=img" alt="Photo de l'annonce">
      </div>
      <div class="bid-content">
        <h3 class="bid-title">{{ bid.title }}</h3>
        <p class="bid-price">{{ bid.price !== null ? (bid.price + ' XPF') : '-' }}</p>
      </div>
    </article>
  } @empty {
    <p class="bid-empty">Aucune annonce pour le moment.</p>
  }
</section>
