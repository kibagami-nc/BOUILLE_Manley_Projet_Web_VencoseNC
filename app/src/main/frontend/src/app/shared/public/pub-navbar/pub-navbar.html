<nav class="navbar" role="navigation" aria-label="Navigation principale">
  <div class="brand-container">
    <a routerLink="/" class="brand">Vencose.nc</a>
  </div>

  <div class="search-container">
    <div class="search-wrapper">
      <button class="search-category-btn" type="button">Catégories</button>
      <input type="text" class="search-input" placeholder="Recherchez..." aria-label="Rechercher">
      <app-icon class="search-icon" name="search" [strokeWidth]="2.5" />
    </div>
  </div>

  <div class="navbar-end">
    @if (!auth.isLoggedIn()) {
      <button type="button" class="nav-action" (click)="modal.open('register')">
        <app-icon class="action-icon" name="user-plus" [size]="22" />
        <span class="action-text">S'enregistrer</span>
      </button>

      <button type="button" class="nav-action" (click)="modal.open('login')">
        <app-icon class="action-icon" name="user" [size]="22" />
        <span class="action-text">Connexion</span>
      </button>
    } @else {

      <button type="button" class="nav-action" routerLink="/mes-annonces">
        <app-icon class="action-icon" name="list" [size]="22" />
        <span class="action-text">Mes annonces</span>
      </button>

      <button type="button" class="nav-action" routerLink="/messages">
        <app-icon class="action-icon" name="mail" [size]="22" />
        <span class="action-text">Messages</span>
      </button>

      <button type="button" class="nav-action" routerLink="/profil">
        <app-icon class="action-icon" name="user-circle" [size]="22" />
        <span class="action-text">Voir profil</span>
      </button>

      <button type="button" class="nav-action nav-action--logout" (click)="modal.open('logout')">
        <app-icon class="action-icon" name="log-out" [size]="22" />
        <span class="action-text">Deconnexion</span>
      </button>
    }
  </div>
</nav>
