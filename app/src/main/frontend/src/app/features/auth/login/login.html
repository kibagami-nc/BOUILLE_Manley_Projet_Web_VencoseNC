<div class="login-card">
  <button type="button" class="modal-close" (click)="modal.close()" aria-label="Fermer">&times;</button>

  <h1 class="login-title">Connexion</h1>

  <form class="login-form" #loginForm="ngForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Email <span class="required">*</span></label>
      <input id="email" type="email" name="email" autocomplete="email" placeholder="exemple@mail.com" [(ngModel)]="email" required>
    </div>

    <div class="form-group">
      <label for="password">Mot de passe <span class="required">*</span></label>
      <div class="password-wrapper">
        <input id="password" [type]="showPassword() ? 'text' : 'password'" name="password" autocomplete="current-password" placeholder="********" [(ngModel)]="password" required>
        <button type="button" class="password-toggle" (click)="toggleShowPassword()" [attr.aria-label]="showPassword() ? 'Masquer le mot de passe' : 'Afficher le mot de passe'">
          <app-icon [name]="showPassword() ? 'eye-off' : 'eye'" />
        </button>
      </div>
    </div>

    @if (errorMessage()) {
      <p class="login-error">{{ errorMessage() }}</p>
    }

    <button type="submit" class="login-btn" [disabled]="loginForm.invalid">Se connecter</button>
  </form>
</div>
