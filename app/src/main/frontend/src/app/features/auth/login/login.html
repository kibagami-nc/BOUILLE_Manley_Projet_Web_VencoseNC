<div class="login-card">
  <button type="button" class="modal-close" (click)="modal.close()" aria-label="Fermer">&times;</button>

  <h1 class="login-title">Connexion</h1>

  <form class="login-form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" autocomplete="email" [(ngModel)]="email" required>
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input id="password" type="password" name="password" autocomplete="current-password" [(ngModel)]="password" required>
    </div>

    @if (errorMessage()) {
      <p class="login-error">{{ errorMessage() }}</p>
    }

    <button type="submit" class="login-btn">Se connecter</button>
  </form>
</div>
