<div class="register-card">
  <button type="button" class="modal-close" (click)="modal.close()" aria-label="Fermer">&times;</button>

  <h1 class="register-title">Inscription</h1>

  <form class="register-form" #registerForm="ngForm" (ngSubmit)="onSubmit()">
    <div class="form-row">
      <div class="form-group">
        <label for="lastName">Nom <span class="required">*</span></label>
        <input id="lastName" type="text" name="lastName" autocomplete="family-name" placeholder="Dupont" [(ngModel)]="lastName" required>
      </div>

      <div class="form-group">
        <label for="firstName">Prenom <span class="required">*</span></label>
        <input id="firstName" type="text" name="firstName" autocomplete="given-name" placeholder="Jean" [(ngModel)]="firstName" required>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email <span class="required">*</span></label>
      <input id="email" type="email" name="email" autocomplete="email" placeholder="exemple@mail.com" [(ngModel)]="email" required>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="phoneMobile">Telephone mobile</label>
        <input id="phoneMobile" type="tel" name="phoneMobile" autocomplete="tel" placeholder="78 12 34" [(ngModel)]="phoneMobile">
      </div>

      <div class="form-group">
        <label for="phoneLandline">Telephone fixe</label>
        <input id="phoneLandline" type="tel" name="phoneLandline" placeholder="24 12 34" [(ngModel)]="phoneLandline">
      </div>
    </div>

    <div class="form-group">
      <label for="password">Mot de passe <span class="required">*</span></label>
      <div class="password-wrapper">
        <input id="password" [type]="showPassword() ? 'text' : 'password'" name="password" autocomplete="new-password" placeholder="8 caracteres, une majuscule, une minuscule et un chiffre" [(ngModel)]="password" required>
        <button type="button" class="password-toggle" (click)="toggleShowPassword()" [attr.aria-label]="showPassword() ? 'Masquer le mot de passe' : 'Afficher le mot de passe'">
          <app-icon [name]="showPassword() ? 'eye-off' : 'eye'" />
        </button>
      </div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirmer le mot de passe <span class="required">*</span></label>
      <input id="confirmPassword" [type]="showPassword() ? 'text' : 'password'" name="confirmPassword" autocomplete="new-password" placeholder="Retapez le mot de passe" [(ngModel)]="confirmPassword" required>
    </div>

    @if (errorMessage()) {
      <p class="register-error">{{ errorMessage() }}</p>
    }

    <button type="submit" class="register-btn" [disabled]="registerForm.invalid">S'enregistrer</button>
  </form>
</div>
