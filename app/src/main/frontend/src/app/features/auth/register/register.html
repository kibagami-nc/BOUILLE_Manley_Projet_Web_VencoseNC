<div class="register-card">
  <button type="button" class="modal-close" (click)="modal.close()" aria-label="Fermer">&times;</button>

  <h1 class="register-title">Inscription</h1>

  <form class="register-form" (ngSubmit)="onSubmit()">
    <div class="form-row">
      <div class="form-group">
        <label for="lastName">Nom</label>
        <input id="lastName" type="text" name="lastName" autocomplete="family-name" [(ngModel)]="lastName" required>
      </div>

      <div class="form-group">
        <label for="firstName">Prenom</label>
        <input id="firstName" type="text" name="firstName" autocomplete="given-name" [(ngModel)]="firstName" required>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" autocomplete="email" [(ngModel)]="email" required>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="phoneMobile">Telephone mobile</label>
        <input id="phoneMobile" type="tel" name="phoneMobile" autocomplete="tel" [(ngModel)]="phoneMobile">
      </div>

      <div class="form-group">
        <label for="phoneLandline">Telephone fixe</label>
        <input id="phoneLandline" type="tel" name="phoneLandline" [(ngModel)]="phoneLandline">
      </div>
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input id="password" type="password" name="password" autocomplete="new-password" [(ngModel)]="password" required>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirmer le mot de passe</label>
      <input id="confirmPassword" type="password" name="confirmPassword" autocomplete="new-password" [(ngModel)]="confirmPassword" required>
    </div>

    <button type="submit" class="register-btn">S'enregistrer</button>
  </form>
</div>
