<app-pub-navbar></app-pub-navbar>
<router-outlet></router-outlet>
@if (showFooter()) {
  <app-pub-footer></app-pub-footer>
}

@if (modal.current() !== null) {
  <div class="modal-backdrop" (click)="modal.close()">
    <div class="modal-content" [class.modal-content--wide]="modal.current() === 'bid'" (click)="$event.stopPropagation()">
      @if (modal.current() === 'login') {
        <app-login></app-login>
      }
      @if (modal.current() === 'register') {
        <app-register></app-register>
      }
      @if (modal.current() === 'logout') {
        <app-logout></app-logout>
      }
      @if (modal.current() === 'bid') {
        <app-pub-bid-details></app-pub-bid-details>
      }
    </div>
  </div>
}
